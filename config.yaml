template_docx_path:    "D:\\JB Pharma internal\\JB Pharma\\Tagging- mapping logic\\Tagging- mapping logic\\QUALITY INFORMATION SUMMARY.docx"
mapping_logic_pdf_path: ""
source_pdf_folder:     "D:\\JB Pharma internal\\JB Pharma\\Cardiolek\\"
output_docx_path:      "D:\\JB Pharma internal\\JB Pharma\\Cardiolek\\Output\\Cardiolek_QIS.docx"
log_folder:            "D:\\JB Pharma internal\\JB Pharma\\Cardiolek\\Output\\logger"

# Unified mode options
# Runs table-driven QIS v2 overlay after legacy placeholder filling.
enable_qis_v2_overlay: true
# Disable legacy pdf2docx table  injection to avoid random line artifacts.
include_pdf_tables: false
# Optional: set dossier root explicitly (contains Module 1 + Module 3).
# Leave empty to auto-derive from source_pdf_folder.
dossier_root: ""

# How many pages to SKIP at start of each PDF (0-based)
# These are cover pages, TOC pages, signature pages — not real content
section_start_pages:
  "3.2.P.2":   2    # Skip cover(p1) + TOC(p2), start at page 3
  "3.2.P.3.5": 2    # Skip cover pages, start at process validation content
  "3.2.P.7":   1    # Skip cover page, start at page 2 (the real summary text)

# Max content pages per section after skipping cover pages
section_page_limits:
  "3.2.P.2":   5    # Take 5 pages of real content after skipping covers
  "3.2.P.3.5": 3    # Take 3 pages of real content
  "3.2.P.7":   2    # Take 2 pages of real content (summary + first spec page)
  "3.2.S.6":   3
  "3.2.S.7":   3

# For these sections, inject only table elements from extracted content.
table_only_sections:
  - "3.2.S.4.1"

# Set true to inject only tables for ALL sections/PDFs.
table_only_all_sections: false

# Optional: force table-only for specific template sections by keyword in table text.
# Template heading (left) is constant (e.g., 2.3.S.4.1), while referred 3.2.* source
# section can vary medicine-to-medicine.
table_keyword_by_template_section:
  "2.3.S.4.1": "Specification"